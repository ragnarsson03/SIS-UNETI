<div class="login-container">
    <!-- Lado Izquierdo: Banner Institucional -->
    <div class="banner">
        <div class="banner-overlay"></div>
        <div class="banner-content">
            <div class="logo-wrapper">
                <span class="material-symbols-outlined logo-icon">school</span>
            </div>
            <h1 class="welcome-title">Soberanía Tecnológica y Educación</h1>
            <h2 class="welcome-subtitle">Sistema de Información Estudiantil - UNETI</h2>
        </div>
        <div class="banner-footer">
            © 2026 UNETI. Todos los derechos reservados.
        </div>
    </div>

    <!-- Lado Derecho: Formulario de Login -->
    <div class="login-wrapper">
        <!-- Logo móvil (se muestra solo en pantallas pequeñas) -->
        <div class="mobile-header">
            <div class="mobile-logo">
                <span class="material-symbols-outlined">school</span>
            </div>
            <h2>UNETI</h2>
        </div>

        <div class="login-card">
            <div class="card-header">
                <h1>Iniciar Sesión</h1>
                <p>Accede a tu cuenta institucional</p>
            </div>

            <form class="login-form">
                <div class="form-group">
                    <label for="id">Cédula de Identidad o Correo</label>
                    <div class="input-group">
                        <input type="text" id="id" placeholder="V-12345678 o usuario@uneti.edu.ve">
                        <span class="material-symbols-outlined input-icon">person</span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <div class="input-group">
                        <input [type]="passwordVisible ? 'text' : 'password'" id="password" placeholder="••••••••">
                        <button type="button" class="password-toggle" (click)="togglePasswordVisibility()">
                            <span class="material-symbols-outlined">
                                {{ passwordVisible ? 'visibility_off' : 'visibility' }}
                            </span>
                        </button>
                    </div>
                </div>

                <div class="form-actions">
                    <label class="remember-me">
                        <input type="checkbox">
                        <span class="checkbox-custom"></span>
                        Recordar mis datos
                    </label>
                    <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" class="btn-login">
                    <span>Ingresar al Sistema</span>
                    <span class="material-symbols-outlined">arrow_forward</span>
                </button>
            </form>
        </div>
    </div>
</div>
